<div class="report-container">

  <div class="header">
    <h2>Reports Management</h2>
  </div>

  <div class="accordion">

    <div
      class="accordion-item"
      *ngFor="let patient of patients">

      <div
        class="accordion-header"
        (click)="toggle(patient.id)">

        <span>
          {{patient.firstName}}
          {{patient.lastName}}
        </span>

        <span>
          {{selectedPatientId === patient.id ? '-' : '+'}}
        </span>

      </div>

      <div
        class="accordion-body"
        *ngIf="selectedPatientId === patient.id">

        <p>
          Patient ID :
          {{patient.patientId}}
        </p>

        <p>
          Mobile :
          {{patient.mobile}}
        </p>

        <p>
          Blood Group :
          {{patient.bloodGroup}}
        </p>

        <button
          class="pdf-btn"
          (click)="generatePdf(patient.id)">

          Download PDF

        </button>

      </div>

    </div>

  </div>

</div>
