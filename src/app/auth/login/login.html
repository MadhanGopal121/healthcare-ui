<div class="login-page">
  <div class="login-card">
    <h3 class="text-center mb-4">EMR Login</h3>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label>Email</label>
        <input [(ngModel)]="email" name="email" type="email" class="form-control" placeholder="Enter email" required />
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input [(ngModel)]="password" name="password" type="password" class="form-control" placeholder="Enter password" required />
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>

      <div class="text-center mt-3">
        <a routerLink="/register">Create Account</a>
      </div>
    </form>
  </div>
</div>
