<div class="register-page">

<div class="register-card">

<h3 class="text-center mb-4">Create Account</h3>

<form (ngSubmit)="register()">

<div class="mb-3">
<label>Name</label>
<input type="text" [(ngModel)]="name" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" [(ngModel)]="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" [(ngModel)]="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label>User Role</label>
 <select [(ngModel)]="roleId" name="roleId" class="form-select" required>
    <option *ngFor="let role of roles" [value]="role.id">
      {{ role.name }}
    </option>
  </select>
</div>

<button class="btn btn-success w-100">Register</button>

<div class="text-center mt-3">
Already have account?
<a routerLink="/login">Login</a>
</div>

</form>

</div>

</div>
